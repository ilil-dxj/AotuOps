<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoOps - 运维平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif; }
        
        /* Login */
        .login-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-box {
            width: 400px;
            background: #fff;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .login-box h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #1a1a2e;
            font-size: 24px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #666; font-size: 14px; }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.4); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg { background: #fff2f0; color: #cf1322; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; display: none; }
        .error-msg.show { display: block; }
        .captcha-row { display: flex; gap: 12px; }
        .captcha-row .form-input { flex: 1; }
        .captcha-img {
            width: 100px;
            height: 44px;
            background: #f5f5f5;
            border-radius: 8px;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #667eea;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 2px;
        }
        
        /* Main Layout */
        .main { display: none; height: 100vh; }
        .main.show { display: flex; }
        
        /* Left Sidebar */
        .sidebar {
            width: 200px;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-header h1 { color: #fff; font-size: 18px; }
        
        .sidebar-nav { flex: 1; padding: 16px 0; }
        .nav-item {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            gap: 12px;
        }
        .nav-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .nav-item.active { background: #667eea; color: #fff; }
        .nav-item .icon { font-size: 18px; }
        
        .sidebar-footer {
            padding: 16px 24px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .user-info { color: rgba(255,255,255,0.7); font-size: 13px; }
        .logout-btn {
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.2); }
        
        /* Content */
        .content {
            flex: 1;
            background: #f5f7fa;
            overflow-y: auto;
        }
        
        .content-header {
            background: #fff;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .content-header h2 { color: #333; font-size: 18px; font-weight: 600; }
        .breadcrumb { color: #999; font-size: 13px; }
        
        .content-body { padding: 24px; }
        
        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .stat-card .label { color: #666; font-size: 13px; margin-bottom: 8px; }
        .stat-card .value { font-size: 28px; font-weight: 700; color: #1a1a2e; }
        .stat-card .value.green { color: #52c41a; }
        .stat-card .value.orange { color: #fa8c16; }
        .stat-card .value.red { color: #f5222d; }
        
        /* Cards */
        .card {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        .card-header h3 { color: #333; font-size: 15px; font-weight: 600; }
        
        /* Table */
        .table { width: 100%; border-collapse: collapse; }
        .table th {
            background: #fafafa;
            padding: 10px 12px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
        }
        .table td {
            padding: 12px;
            font-size: 13px;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
        }
        .table tr:hover td { background: #fafafa; }
        .table tr:last-child td { border-bottom: none; }
        
        .status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .status.running { background: #f6ffed; color: #52c41a; }
        .status.pending { background: #fffbe6; color: #fa8c16; }
        .status.failed { background: #fff2f0; color: #f5222d; }
        
        .loading { text-align: center; padding: 40px; color: #999; }
        .error-msg { background: #fff2f0; padding: 16px; border-radius: 8px; color: #cf1322; }
        
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

<!-- Login -->
<div id="loginPage" class="login-wrap">
    <div class="login-box">
        <h1>⚙️ AutoOps</h1>
        <div id="errorMsg" class="error-msg"></div>
        <div class="form-group">
            <label>用户名</label>
            <input type="text" id="username" class="form-input" placeholder="请输入用户名" value="admin">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" class="form-input" placeholder="请输入密码" value="admin">
        </div>
        <div class="form-group">
            <label>验证码</label>
            <div class="captcha-row">
                <input type="text" id="captcha" class="form-input" placeholder="验证码" maxlength="4">
                <div class="captcha-img" id="captchaImg" onclick="refreshCaptcha()">点击</div>
            </div>
        </div>
        <button id="loginBtn" class="btn-login" onclick="doLogin()">登 录</button>
    </div>
</div>

<!-- Main -->
<div id="mainPage" class="main">
    <!-- Left Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>⚙️ AutoOps</h1>
        </div>
        <div class="sidebar-nav">
            <div class="nav-item active" onclick="showPage('dashboard', this)">
                <span class="icon">📊</span>
                <span>仪表盘</span>
            </div>
            <div class="nav-item" onclick="showPage('nodes', this)">
                <span class="icon">🖥️</span>
                <span>节点</span>
            </div>
            <div class="nav-item" onclick="showPage('pods', this)">
                <span class="icon">📦</span>
                <span>Pod</span>
            </div>
            <div class="nav-item" onclick="showPage('deployments', this)">
                <span class="icon">🚀</span>
                <span>Deployment</span>
            </div>
            <div class="nav-item" onclick="showPage('services', this)">
                <span class="icon">🌐</span>
                <span>Service</span>
            </div>
            <div class="nav-item" onclick="showPage('configmaps', this)">
                <span class="icon">🔧</span>
                <span>ConfigMap</span>
            </div>
            <div class="nav-item" onclick="showPage('secrets', this)">
                <span class="icon">🔐</span>
                <span>Secret</span>
            </div>
        </div>
        <div class="sidebar-footer">
            <div class="user-info" id="userDisplay"></div>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </div>
    
    <!-- Content -->
    <div class="content">
        <div class="content-header">
            <h2 id="pageTitle">仪表盘</h2>
            <span class="breadcrumb">AutoOps / <span id="breadcrumb">仪表盘</span></span>
        </div>
        <div class="content-body">
            
            <!-- Dashboard -->
            <div id="page-dashboard" class="page active">
                <div class="stats" id="statsGrid"></div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                    <div class="card">
                        <div class="card-header"><h3>📦 Pod 状态</h3></div>
                        <div id="podsStatus"></div>
                    </div>
                    <div class="card">
                        <div class="card-header"><h3>🖥️ 节点状态</h3></div>
                        <div id="nodesStatus"></div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header"><h3>🚀 Deployment 列表</h3></div>
                    <div id="deploymentsList"></div>
                </div>
                <div class="card">
                    <div class="card-header"><h3>📦 Pod 列表</h3></div>
                    <div id="podsList"></div>
                </div>
            </div>
            
            <!-- Nodes -->
            <div id="page-nodes" class="page">
                <div class="card">
                    <div class="card-header"><h3>🖥️ 节点列表</h3></div>
                    <div id="nodesTable"></div>
                </div>
            </div>
            
            <!-- Pods -->
            <div id="page-pods" class="page">
                <div class="card">
                    <div class="card-header"><h3>📦 Pod 列表</h3></div>
                    <div id="podsTable"></div>
                </div>
            </div>
            
            <!-- Deployments -->
            <div id="page-deployments" class="page">
                <div class="card">
                    <div class="card-header"><h3>🚀 Deployment 列表</h3></div>
                    <div id="deploymentsTable"></div>
                </div>
            </div>
            
            <!-- Services -->
            <div id="page-services" class="page">
                <div class="card">
                    <div class="card-header"><h3>🌐 Service 列表</h3></div>
                    <div id="servicesTable"></div>
                </div>
            </div>
            
            <!-- ConfigMaps -->
            <div id="page-configmaps" class="page">
                <div class="card">
                    <div class="card-header"><h3>🔧 ConfigMap 列表</h3></div>
                    <div id="configmapsTable"></div>
                </div>
            </div>
            
            <!-- Secrets -->
            <div id="page-secrets" class="page">
                <div class="card">
                    <div class="card-header"><h3>🔐 Secret 列表</h3></div>
                    <div id="secretsTable"></div>
                </div>
            </div>
            
        </div>
    </div>
</div>

<script>
const API = '/api/v1';
function $(id) { return document.getElementById(id); }

let currentCaptcha = '';
function refreshCaptcha() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    currentCaptcha = '';
    for(let i = 0; i < 4; i++) {
        currentCaptcha += chars[Math.floor(Math.random() * chars.length)];
    }
    $('captchaImg').textContent = currentCaptcha;
}
refreshCaptcha();

function doLogin() {
    const username = $('username').value.trim();
    const password = $('password').value;
    const captcha = $('captcha').value.trim().toUpperCase();
    const btn = $('loginBtn');
    const errorMsg = $('errorMsg');
    
    if (!username || !password) {
        errorMsg.textContent = '请输入用户名和密码';
        errorMsg.classList.add('show');
        return;
    }
    
    if (captcha !== currentCaptcha) {
        errorMsg.textContent = '验证码错误';
        errorMsg.classList.add('show');
        refreshCaptcha();
        return;
    }
    
    errorMsg.classList.remove('show');
    btn.disabled = true;
    btn.textContent = '登录中...';
    
    fetch(API + '/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username, password})
    })
    .then(r => r.json())
    .then(data => {
        if (data.token) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('username', data.username);
            localStorage.setItem('role', data.role);
            showMain(data);
        } else {
            errorMsg.textContent = '登录失败: ' + (data.error || '未知错误');
            errorMsg.classList.add('show');
            btn.disabled = false;
            btn.textContent = '登 录';
            refreshCaptcha();
        }
    })
    .catch(e => {
        errorMsg.textContent = '网络错误: ' + e.message;
        errorMsg.classList.add('show');
        btn.disabled = false;
        btn.textContent = '登 录';
    });
}

document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter' && $('loginPage').style.display !== 'none') {
        doLogin();
    }
});

function showMain(userData) {
    $('loginPage').style.display = 'none';
    $('mainPage').classList.add('show');
    $('userDisplay').textContent = userData.username + ' (' + userData.role + ')';
    loadDashboard();
}

function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('username');
    localStorage.removeItem('role');
    location.reload();
}

const pageTitles = {
    dashboard: '仪表盘',
    nodes: '节点',
    pods: 'Pod',
    deployments: 'Deployment',
    services: 'Service',
    configmaps: 'ConfigMap',
    secrets: 'Secret'
};

function showPage(page, el) {
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    if (el) el.classList.add('active');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    $('page-' + page).classList.add('active');
    $('pageTitle').textContent = pageTitles[page];
    $('breadcrumb').textContent = pageTitles[page];
    
    if (page === 'dashboard') loadDashboard();
    else if (page === 'nodes') loadNodes();
    else if (page === 'pods') loadPods();
    else if (page === 'deployments') loadDeployments();
    else if (page === 'services') loadServices();
    else if (page === 'configmaps') loadConfigmaps();
    else if (page === 'secrets') loadSecrets();
}

function loadDashboard() {
    Promise.all([
        fetch(API + '/pods').then(r => r.ok ? r.json() : []),
        fetch(API + '/namespaces').then(r => r.ok ? r.json() : []),
        fetch(API + '/nodes').then(r => r.ok ? r.json() : []),
        fetch(API + '/deployments').then(r => r.ok ? r.json() : []),
        fetch(API + '/services').then(r => r.ok ? r.json() : [])
    ])
    .then(([pods, namespaces, nodes, deployments, services]) => {
        const running = pods.filter(p => p.status && p.status.phase === 'Running').length;
        const pending = pods.filter(p => p.status && p.status.phase === 'Pending').length;
        const failed = pods.filter(p => p.status && p.status.phase === 'Failed').length;
        const readyNodes = nodes.filter(n => n.status.conditions.find(c => c.type === 'Ready' && c.status === 'True')).length;
        
        $('statsGrid').innerHTML = `
            <div class="stat-card"><div class="label">🖥️ 节点</div><div class="value">${nodes.length}</div></div>
            <div class="stat-card"><div class="label">📦 Pod</div><div class="value">${pods.length}</div></div>
            <div class="stat-card"><div class="label">🚀 Deployment</div><div class="value">${deployments.length}</div></div>
            <div class="stat-card"><div class="label">🌐 Service</div><div class="value">${services.length}</div></div>
            <div class="stat-card"><div class="label">📁 命名空间</div><div class="value">${namespaces.length}</div></div>
            <div class="stat-card"><div class="label">✅ Running</div><div class="value green">${running}</div></div>
            <div class="stat-card"><div class="label">⏳ Pending</div><div class="value orange">${pending}</div></div>
            <div class="stat-card"><div class="label">❌ Failed</div><div class="value red">${failed}</div></div>
        `;
        
        $('podsStatus').innerHTML = `
            <table class="table">
                <tr><td>✅ Running</td><td style="color:#52c41a;font-weight:600;">${running}</td></tr>
                <tr><td>⏳ Pending</td><td style="color:#fa8c16;font-weight:600;">${pending}</td></tr>
                <tr><td>❌ Failed</td><td style="color:#f5222d;font-weight:600;">${failed}</td></tr>
            </table>`;
        
        $('nodesStatus').innerHTML = `
            <table class="table">
                <tr><td>✅ Ready</td><td style="color:#52c41a;font-weight:600;">${readyNodes}</td></tr>
                <tr><td>❌ NotReady</td><td style="color:#f5222d;font-weight:600;">${nodes.length - readyNodes}</td></tr>
            </table>`;
        
        $('deploymentsList').innerHTML = deployments.length ? `
            <table class="table">
                <thead><tr><th>名称</th><th>命名空间</th><th>Ready</th></tr></thead>
                <tbody>${deployments.map(d => {
                    const ready = d.status.readyReplicas || 0;
                    const desired = d.spec.replicas || 0;
                    return `<tr><td>${d.metadata.name}</td><td>${d.metadata.namespace}</td><td><span class="status ${ready === desired ? 'running' : 'pending'}">${ready}/${desired}</span></td></tr>`;
                }).join('')}</tbody>
            </table>` : '<div class="loading">暂无数据</div>';
        
        $('podsList').innerHTML = pods.length ? `
            <table class="table">
                <thead><tr><th>名称</th><th>命名空间</th><th>状态</th><th>Node</th></tr></thead>
                <tbody>${pods.slice(0, 20).map(p => `<tr>
                    <td>${p.metadata.name}</td><td>${p.metadata.namespace}</td>
                    <td><span class="status ${p.status.phase.toLowerCase()}">${p.status.phase}</span></td>
                    <td>${p.spec.nodeName || '-'}</td>
                </tr>`).join('')}</tbody>
            </table>
            ${pods.length > 20 ? '<div style="text-align:center;padding:12px;color:#999;">共 ' + pods.length + ' 条，显示前20条</div>' : ''}` : '<div class="loading">暂无数据</div>';
    })
    .catch(e => {
        $('statsGrid').innerHTML = '<div class="error-msg">加载失败: ' + e.message + '</div>';
    });
}

function loadNodes() {
    fetch(API + '/nodes').then(r => r.json()).then(nodes => {
        $('nodesTable').innerHTML = nodes.length ? `
            <table class="table">
                <thead><tr><th>名称</th><th>状态</th><th>角色</th><th>版本</th><th>CPU</th><th>内存</th></tr></thead>
                <tbody>${nodes.map(n => {
                    const ready = n.status.conditions.find(c => c.type === 'Ready' && c.status === 'True');
                    const role = n.metadata.labels['node-role.kubernetes.io/control-plane'] ? 'control-plane' : 'worker';
                    return `<tr>
                        <td>${n.metadata.name}</td>
                        <td><span class="status ${ready ? 'running' : 'failed'}">${ready ? 'Ready' : 'NotReady'}</span></td>
                        <td>${role}</td>
                        <td>${n.status.nodeInfo.kubeletVersion}</td>
                        <td>${n.status.capacity.cpu}</td>
                        <td>${Math.round(parseInt(n.status.capacity.memory)/1024/1024/1024)}Gi</td>
                    </tr>`;
                }).join('')}</tbody>
            </table>` : '<div class="loading">暂无节点</div>';
    }).catch(e => { $('nodesTable').innerHTML = '<div class="error-msg">加载失败</div>'; });
}

function loadPods() {
    fetch(API + '/pods').then(r => r.json()).then(pods => {
        $('podsTable').innerHTML = pods.length ? `
            <table class="table">
                <thead><tr><th>名称</th><th>命名空间</th><th>状态</th><th>Node</th><th>创建时间</th></tr></thead>
                <tbody>${pods.map(p => `<tr>
                    <td>${p.metadata.name}</td><td>${p.metadata.namespace}</td>
                    <td><span class="status ${p.status.phase.toLowerCase()}">${p.status.phase}</span></td>
                    <td>${p.spec.nodeName || '-'}</td>
                    <td>${new Date(p.metadata.creationTimestamp).toLocaleString()}</td>
                </tr>`).join('')}</tbody>
            </table>` : '<div class="loading">暂无Pods</div>';
    }).catch(e => { $('podsTable').innerHTML = '<div class="error-msg">加载失败</div>'; });
}

function loadDeployments() {
    fetch(API + '/deployments').then(r => r.json()).then(deps => {
        $('deploymentsTable').innerHTML = deps.length ? `
            <table class="table">
                <thead><tr><th>名称</th><th>命名空间</th><th>Ready</th><th>Available</th></tr></thead>
                <tbody>${deps.map(d => {
                    const ready = d.status.readyReplicas || 0;
                    const desired = d.spec.replicas || 0;
                    return `<tr>
                        <td>${d.metadata.name}</td><td>${d.metadata.namespace}</td>
                        <td><span class="status ${ready === desired ? 'running' : 'pending'}">${ready}/${desired}</span></td>
                        <td>${d.status.availableReplicas || 0}</td>
                    </tr>`;
                }).join('')}</tbody>
            </table>` : '<div class="loading">暂无Deployments</div>';
    }).catch(e => { $('deploymentsTable').innerHTML = '<div class="error-msg">加载失败</div>'; });
}

function loadServices() {
    fetch(API + '/services').then(r => r.json()).then(svcs => {
        $('servicesTable').innerHTML = svcs.length ? `
            <table class="table">
                <thead><tr><th>名称</th><th>命名空间</th><th>类型</th><th>ClusterIP</th><th>端口</th></tr></thead>
                <tbody>${svcs.map(s => `<tr>
                    <td>${s.metadata.name}</td><td>${s.metadata.namespace}</td>
                    <td>${s.spec.type}</td><td>${s.spec.clusterIP || '-'}</td>
                    <td>${s.spec.ports.map(p => p.port).join(', ')}</td>
                </tr>`).join('')}</tbody>
            </table>` : '<div class="loading">暂无Services</div>';
    }).catch(e => { $('servicesTable').innerHTML = '<div class="error-msg">加载失败</div>'; });
}

function loadConfigmaps() {
    fetch(API + '/configmaps').then(r => r.json()).then(cms => {
        $('configmapsTable').innerHTML = cms.length ? `
            <table class="table">
                <thead><tr><th>名称</th><th>命名空间</th><th>键数量</th></tr></thead>
                <tbody>${cms.map(c => `<tr>
                    <td>${c.metadata.name}</td><td>${c.metadata.namespace}</td>
                    <td>${Object.keys(c.data || {}).length}</td>
                </tr>`).join('')}</tbody>
            </table>` : '<div class="loading">暂无ConfigMaps</div>';
    }).catch(e => { $('configmapsTable').innerHTML = '<div class="error-msg">加载失败</div>'; });
}

function loadSecrets() {
    fetch(API + '/secrets').then(r => r.json()).then(secrets => {
        $('secretsTable').innerHTML = secrets.length ? `
            <table class="table">
                <thead><tr><th>名称</th><th>命名空间</th><th>类型</th><th>键数量</th></tr></thead>
                <tbody>${secrets.map(s => `<tr>
                    <td>${s.metadata.name}</td><td>${s.metadata.namespace}</td>
                    <td>${s.type}</td><td>${Object.keys(s.data || {}).length}</td>
                </tr>`).join('')}</tbody>
            </table>` : '<div class="loading">暂无Secrets</div>';
    }).catch(e => { $('secretsTable').innerHTML = '<div class="error-msg">加载失败</div>'; });
}

// Init
const savedToken = localStorage.getItem('token');
if (savedToken) {
    showMain({username: localStorage.getItem('username'), role: localStorage.getItem('role')});
}
</script>
</body>
</html>
